name: Auto All EPG

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: AllEpg-epg-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # REQUIRED for rebase

    - name: Install 7zip
      run: sudo apt-get update && sudo apt-get install -y p7zip-full

    - name: Extract ZIP Securely
      run: 7z x ignore/Allinone2.zip -p"${{ secrets.ZIP_PASSWORD }}" -y

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install --no-cache-dir requests pytz

    - name: Run Script
      run: python -u Allinone2.py

    - name: Commit & Push Output
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        # Add file if exists
        git add Airtelepg.xml.gz || echo "No file found"
        git add tata.xml.gz || echo "No file found"
        git add jio.xml.gz || echo "No file found"
        git add dishtvEPG.xml.gz || echo "No file found"
        git add Zee5.xml.gz || echo "No file found"

        # Skip commit if no real changes
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Auto All 7day EPG updated"

        # 🔥 CRITICAL: sync before push
        git pull --rebase origin main

        # Push safely
        git push origin main
